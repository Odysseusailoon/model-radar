<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GTM Evidence Radar{% endblock %}</title>
  <style>
    :root { --bg:#f6f7f9; --card:#fff; --line:#e4e7ec; --ink:#1a1d23; --muted:#667085; --brand:#3b5bdb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--ink); }
    header { background:var(--card); border-bottom:1px solid var(--line); padding:12px 20px; display:flex; gap:20px; align-items:center; position:sticky; top:0; z-index:5; }
    header a { color:var(--brand); text-decoration:none; font-weight:600; }
    header .title { font-weight:700; font-size:16px; }
    .wrap { max-width:960px; margin:0 auto; padding:18px 16px 60px; }
    .filters { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:16px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
    .filters label { font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
    select, input[type=number], input[type=text], input[type=date], textarea { padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:13px; background:#fff; }
    button, .btn { cursor:pointer; border:1px solid var(--line); background:#fff; border-radius:6px; padding:6px 12px; font-size:13px; }
    .btn-primary { background:var(--brand); color:#fff; border-color:var(--brand); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:12px; }
    .row { display:flex; justify-content:space-between; gap:10px; align-items:baseline; }
    .muted { color:var(--muted); font-size:12px; }
    .tag { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; }
    .t-demo{background:#e7f5ff;color:#1971c2}.t-customer_case{background:#ebfbee;color:#2f9e44}
    .t-expert_review{background:#fff3bf;color:#e67700}.t-news{background:#f1f3f5;color:#495057}
    .t-promo{background:#ffe3e3;color:#c92a2a}.t-irrelevant{background:#f1f3f5;color:#868e96}
    .s-positive{color:#2f9e44}.s-negative{color:#c92a2a}.s-neutral{color:#868e96}
    .excerpt { border-left:3px solid var(--brand); padding:6px 10px; margin:8px 0; background:#fafbff; font-size:14px; }
    .actions { display:flex; gap:8px; margin-top:10px; }
    .failed { border-color:#ffa8a8; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th,td { border:1px solid var(--line); padding:8px; font-size:13px; text-align:left; vertical-align:top; }
    .pill { font-size:11px; padding:1px 6px; border-radius:4px; background:#eef; }
  </style>
</head>
<body>
  <header>
    <span class="title">📡 GTM Evidence Radar</span>
    <a href="/">证据流</a>
    <a href="/admin/products">产品配置</a>
  </header>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
